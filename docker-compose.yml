services:
  app:
    build:
      context: .
    image: solar-tracking-app:local
    container_name: solar_tracking_app
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - backup_data:/app/backups
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      TZ: ${TZ:-Europe/Rome}
      CUBBIT_BUCKET: ${CUBBIT_BUCKET:-solar-tracking-app}
      CUBBIT_BACKUP_PREFIX: ${CUBBIT_BACKUP_PREFIX:-backups}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-cubbit:solar-tracking-app/backups}
      RCLONE_CONFIG_CUBBIT_TYPE: s3
      RCLONE_CONFIG_CUBBIT_PROVIDER: Cubbit
      RCLONE_CONFIG_CUBBIT_ACCESS_KEY_ID: ${CUBBIT_ACCESS_KEY_ID}
      RCLONE_CONFIG_CUBBIT_SECRET_ACCESS_KEY: ${CUBBIT_SECRET_ACCESS_KEY}
      RCLONE_CONFIG_CUBBIT_REGION: ${CUBBIT_REGION:-eu-west-1}
      RCLONE_CONFIG_CUBBIT_ENDPOINT: ${CUBBIT_ENDPOINT:-s3.cubbit.eu}
    env_file:
      - path: .env.docker
        required: false
      - path: .env
        required: false
    command: pnpm dev --host 0.0.0.0
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    build:
      context: .
    image: solar-tracking-app:local
    container_name: solar_tracking_worker
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      TZ: ${TZ:-Europe/Rome}
    env_file:
      - path: .env.docker
        required: false
      - path: .env
        required: false
    command: pnpm sync:worker
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: solar_tracking_db
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pwd}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-solar_tracking}
      MYSQL_USER: ${MYSQL_USER:-solartracking}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-solartracking_pwd}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: solar_tracking_llm
    ports:
      - "127.0.0.1:8080:8080"
    profiles: ["full"]

  telegram-bot:
    build:
      context: .
    image: solar-tracking-app:local
    container_name: solar_tracking_tgbot
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "echo 'Telegram bot placeholder for Phase 3' && sleep infinity"
    profiles: ["full"]

  backup:
    build:
      context: .
    image: solar-tracking-app:local
    container_name: solar_tracking_backup
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - backup_data:/app/backups
    env_file:
      - path: .env.docker
        required: false
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-Europe/Rome}
      CUBBIT_BUCKET: ${CUBBIT_BUCKET:-solar-tracking-app}
      CUBBIT_BACKUP_PREFIX: ${CUBBIT_BACKUP_PREFIX:-backups}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-cubbit:solar-tracking-app/backups}
      BACKUP_SCHEDULE_TZ: ${BACKUP_SCHEDULE_TZ:-Europe/Rome}
      BACKUP_SCHEDULE_HOUR: ${BACKUP_SCHEDULE_HOUR:-3}
      BACKUP_RETENTION_DAYS_LOCAL: ${BACKUP_RETENTION_DAYS_LOCAL:-7}
      BACKUP_RETENTION_DAYS_REMOTE: ${BACKUP_RETENTION_DAYS_REMOTE:-30}
      RCLONE_CONFIG_CUBBIT_TYPE: s3
      RCLONE_CONFIG_CUBBIT_PROVIDER: Cubbit
      RCLONE_CONFIG_CUBBIT_ACCESS_KEY_ID: ${CUBBIT_ACCESS_KEY_ID}
      RCLONE_CONFIG_CUBBIT_SECRET_ACCESS_KEY: ${CUBBIT_SECRET_ACCESS_KEY}
      RCLONE_CONFIG_CUBBIT_REGION: ${CUBBIT_REGION:-eu-west-1}
      RCLONE_CONFIG_CUBBIT_ENDPOINT: ${CUBBIT_ENDPOINT:-s3.cubbit.eu}
    command: sh scripts/backup-loop.sh
    depends_on:
      mysql:
        condition: service_healthy
    profiles: ["backup"]

volumes:
  mysql_data:
  backup_data:
