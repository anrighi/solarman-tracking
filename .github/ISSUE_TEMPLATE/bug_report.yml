name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please redact API keys, passwords, and chat IDs from logs.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. docker compose up -d
        2. pnpm run sync:once
        3. ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker Compose
        - Local dev (pnpm run dev)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: main @ abc1234

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
