name: Sync GitHub feature issues

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-github-tasks.yml
      - scripts/github-tasks.manifest.json
      - scripts/sync-github-tasks.sh
      - scripts/render-github-issue-body.ts
      - docs/features/**
      - docs/FEATURES.md
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/sync-github-tasks.yml
      - scripts/github-tasks.manifest.json
      - scripts/sync-github-tasks.sh
      - scripts/render-github-issue-body.ts
      - docs/features/**
      - docs/FEATURES.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: ${{ github.event_name == 'pull_request' && 'read' || 'write' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate issue sync (dry run)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/sync-github-tasks.sh --dry-run

      - name: Sync manifest → GitHub Issues
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/sync-github-tasks.sh
